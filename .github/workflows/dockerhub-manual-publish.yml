name: Publish Docker Hub Image

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git branch, tag, or SHA to build
        required: true
        default: main
      image_tag:
        description: Docker image tag to publish
        required: true
        default: 7.2.0
      publish_latest:
        description: Also publish the latest tag
        required: true
        type: boolean
        default: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags
        id: docker_tags
        run: |
          TAGS="${{ secrets.DOCKERHUB_USERNAME }}/emby-vision-hub:${{ inputs.image_tag }}"
          if [ "${{ inputs.publish_latest }}" = "true" ]; then
            TAGS="$TAGS,${{ secrets.DOCKERHUB_USERNAME }}/emby-vision-hub:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
