# EVH · Emby Vision Hub 本地构建与持久化部署示例

services:
  emby-vision-hub:
    build: .
    image: tzyzero186/emby-vision-hub:latest
    container_name: emby-vision-hub
    restart: unless-stopped
    volumes:
      - ./local_data:/config 
    environment:
      - APP_DATA_DIR=/config
      - PUID=1000
      - PGID=1000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=evh
      - DB_PASSWORD=change-me
      - DB_NAME=evh
      - CONTAINER_NAME=emby-vision-hub
      - DOCKER_IMAGE_NAME=tzyzero186/emby-vision-hub:latest
    ports:
      - "5257:5257"
      - "8096:8096"
    networks:
      - evh-net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5257/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
  
  db:
    image: postgres:16-alpine 
    container_name: emby-vision-hub-db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=evh
      - POSTGRES_PASSWORD=change-me
      - POSTGRES_DB=evh
    networks:
      - evh-net
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evh -d evh"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  evh-net:
    driver: bridge
  
volumes:
  postgres_data:
